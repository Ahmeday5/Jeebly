<div class="add-category mt-2 mb-3">
  <div class="container-fluid  p-0">
    <form action="" class="mt-4 form-add-category">
      <!-----------------name and logo----------------->
      <div class="row p-0">
        <div class="page-title">
          <h3>
            <span class="icon">
              <i class="fas fa-folder-open"></i>
            </span>
            تحديث الفئة
          </h3>
        </div>
        <div class="col-xl-6 col-lg-6 col-md-12 mt-2 name">
          <div class="title d-flex justify-content-start">
            <h6 [ngClass]="{'active': selectedLanguage === 'default'}" (click)="selectLanguage('default')">
              افتراضي
            </h6>
            <h6 [ngClass]="{'active': selectedLanguage === 'english'}" (click)="selectLanguage('english')">
              English
              (EN)
            </h6>
            <h6 [ngClass]="{'active': selectedLanguage === 'arabic'}" (click)="selectLanguage('arabic')">Arabic
              -
              العربية (AR)</h6>
          </div>
          <div class="form-section mt-4">
            <label for="validationCustom01" class="form-label"> الاسم ({{ selectedLanguageLabel }})</label>
            <input type="text" id="validationCustom01" class="form-control"
              placeholder="{{ selectedLanguageePlaceholder }}" name="restaurantName" required />
            <div class="invalid-feedback">يرجى إدخال اسم صالح</div>
            <div class="valid-feedback">يبدو جيدًا!</div>
          </div>
        </div>
        <div class="col-xl-6 col-lg-6 col-md-12 mt-2">
          <div class="logo">
            <div class="page-title">
              <h3>
                <span class="icon">
                  <i class="fas fa-image"></i>
                </span>
                شعار المطعم وغطاءاته
              </h3>
            </div>
            <div class="row justify-content-center">
              <div class="col-md-8">
                <div class="row">
                  <div class="col-md-12">
                    <h6 class="text-center">صورة الفئة</h6>
                  </div>
                  <div class="col-12">
                    <div class="form-section">
                      <label class="upload-label">
                        <span><i class="fa-solid fa-arrow-up-from-bracket"></i></span>
                        <input type="file" id="logoUpload" (change)="onFileChange($event, 'logo')"
                          accept=".jpg,.png,.jpeg,.gif" />
                      </label>
                      <div class="upload-details">
                        <p>صيغة الصورة</p>
                        <p>jpg, png, jpeg, gif</p>
                        <p>حجم الصورة</p>
                        <p>الحد الأقصى: 2 ميجابايت</p>
                        <p>نسبة الصورة - 1:1</p>
                      </div>
                      <div class="invalid-feedback" *ngIf="logoError">{{ logoError }}</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!----------------------btns----------------------->
      <div class="row p-0 mt-3">
        <div class="btns">
          <div class="row justify-content-end">
            <button class="btn btn-rest">إعادة تعيين</button>
            <button class="btn btn-save">تحديث</button>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
