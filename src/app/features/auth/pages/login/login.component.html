<div class="container-fluid img-bg">
  <div class="row justify-content-end">
    <div class="col-md-5 login-header">
      <div class="row p-3 align-content-center align-items-center justify-content-center" style="min-height: 100vh;">
        <div class="col-md-12 header">
          <h1 class="text-center">أهلا بك ف جيبلي</h1>
          <h1 class="text-center mt-1">إدارة تطبيقك وموقعك الإلكتروني بسهولة</h1>
        </div>
        <div class="col-md-12 img-logo text-center mt-4">
          <img src="/assets/img/logo.png" class="img-fluid" style="width: 400px;" alt="">
        </div>

        <div class="col-md-12">
          <div class="header-form">
            <h3 class="text-center">تسجيل الدخول الي لوحتك</h3>
          </div>
          <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">
            <div class="form-group mt-4">
              <label for="email" class="form-label">البريد الإلكتروني</label>
              <input type="email" placeholder="البريد الالكتروني" class="form-control" id="email" name="email"
                [(ngModel)]="email" required>
            </div>
            <div class="form-group mt-3">
              <label for="password" class="form-label">كلمة السر</label>
              <input [type]="showPassword ? 'text' : 'password'" placeholder="كلمة المرور" class="form-control"
                id="password" name="password" [(ngModel)]="password" required>
              <span class="password-toggle" (click)="togglePassword()">
                <i class="fa-regular {{ showPassword ? 'fa-eye-slash' : 'fa-eye' }}" style="color: #8C0F14;"></i>
              </span>
            </div>
            <div class="remember-content row mt-2 justify-content-between">
              <div class="col-3">
                <div class="remember form-check">
                  <label class="form-check-label" for="checkDefault">
                    تذكرني
                  </label>
                  <input class="form-check-input" type="checkbox" id="checkDefault" name="rememberMe">
                </div>
              </div>
              <div class="col-5 forgetpass">
                <div class="d-flex forgetpassdiv">
                  <a href="#" class="btn" role="button" data-bs-toggle="button">نسيت كلمة المرور؟</a>
                </div>
              </div>
            </div>
            <div class="submit text-center mt-3">
              <button type="submit" class="btn btn-login"><span *ngIf="isLoading"
                  class="spinner-border spinner-border-sm"></span>تسجيل الدخول</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
